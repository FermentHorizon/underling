; =============================================================================
;  Underling — Plant Transpiration Monitor
;  PlatformIO Project Configuration
; =============================================================================
;
;  Hardware:  ESP32 WROOM-32  +  ADS1232 (24-bit ADC)  +  40 kg Load Cell
;  Framework: Arduino (ESP-IDF under the hood via espressif32 platform)
;
;  Build:   pio run
;  Upload:  pio run -t upload
;  Monitor: pio device monitor
;  All:     pio run -t upload && pio device monitor
; =============================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; --- Serial ---
monitor_speed  = 115200
upload_speed   = 460800
upload_port    = /dev/cu.usbserial-10
monitor_port   = /dev/cu.usbserial-10
monitor_dtr    = 0
monitor_rts    = 0
monitor_filters = send_on_enter

; --- Library Dependencies ---
lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

; --- Build Flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    ; Maximise available stack for tasks
    -DARDUINO_RUNNING_CORE=1

; --- Partition Table (default 4 MB, no OTA for now) ---
board_build.partitions = default.csv
